name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo / Tauri target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (NSIS + MSI)
        run: npx tauri build

      - name: Normalize installer filename
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          $nsis = Get-ChildItem "$bundle/nsis/*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsis) {
            $dst = Join-Path $nsis.Directory "Cerberus-Setup.exe"
            if ($nsis.FullName -ne $dst) { Move-Item -Force $nsis.FullName $dst }
            Write-Host "NSIS: $dst"
          } else {
            Write-Host "::warning::No NSIS exe produced"
          }
          Get-ChildItem "$bundle" -Recurse -Include *.exe,*.msi | ForEach-Object { Write-Host $_.FullName }

      - name: Compute SHA-256 hashes
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          $files  = Get-ChildItem $bundle -Recurse -Include *.exe,*.msi
          $files | ForEach-Object {
            $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$h  $($_.Name)" | Tee-Object -Append SHA256SUMS.txt
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/Cerberus-Setup.exe
            src-tauri/target/release/bundle/msi/*.msi
            SHA256SUMS.txt

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Cerberus Desktop ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/Cerberus-Setup.exe
            src-tauri/target/release/bundle/msi/*.msi
            SHA256SUMS.txt
